body: |-
  ## Context
  
  The repository already distinguishes canonical contract inputs from generated downstream outputs. The `contract/` tree contains the canonical ASGI contract vocabulary, schemas, compatibility metadata, legality matrices, checksums, and manifest. Generated Python, Rust, and TypeScript artifacts are derived from those inputs and are validated through generation and parity tests.
  
  ## Decision
  
  The `contract/` tree is the canonical source for contract vocabulary, schemas, matrices, compatibility metadata, manifests, and checksums.
  
  The `.ssot/` tree is the canonical governance source for ADRs, SPECs, registry entities, claims, evidence, boundaries, releases, reports, and generated SSOT exports. `.ssot/registry.json` is maintained through SSOT tooling rather than ad hoc edits.
  
  Generated language packages, package readmes, release bundles, and generated docs are projections of canonical inputs. They may be committed for review, packaging, and downstream consumption, but they shall not be hand-edited as the source of truth for contract semantics.
  
  Documentation explains and projects SSOT and contract decisions. When docs conflict with `contract/` or `.ssot/`, the canonical contract and SSOT sources win.
  
  Tests and workflows are verification and gate surfaces. They enforce conformance, parity, generation cleanliness, release preparation, and publication policy, but they do not replace the canonical contract or governance sources.
  
  ## Consequences
  
  Contract changes start in canonical contract files and are propagated through generation.
  
  SSOT governance changes start in `.ssot` documents/entities through SSOT tooling and are projected into docs or generated exports.
