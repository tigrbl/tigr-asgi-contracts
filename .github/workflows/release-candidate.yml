name: release-candidate

on:
  workflow_call:
    inputs:
      ref_name:
        description: Branch or ref name to promote from
        required: false
        default: ""
        type: string
      rc_tag:
        description: Optional prerelease tag override
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      ref_name:
        description: Branch or ref name to promote from
        required: false
        default: ""
      rc_tag:
        description: Optional prerelease tag override
        required: false
        default: ""

concurrency:
  group: release-candidate-${{ inputs.ref_name != '' && inputs.ref_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    outputs:
      rc_tag: ${{ steps.meta.outputs.rc_tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref_name != '' && inputs.ref_name || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install -q pytest pydantic pyyaml jsonschema build
      - id: meta
        shell: bash
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          if [ -n "${{ inputs.rc_tag }}" ]; then
            rc_tag="${{ inputs.rc_tag }}"
          else
            rc_tag="v${version}-rc.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "rc_tag=$rc_tag" >> "$GITHUB_OUTPUT"
      - run: python tools/check_versions.py "${{ steps.meta.outputs.version }}"
      - run: python tools/validate_yaml.py
      - run: python tools/validate_jsonschema.py
      - run: python tools/generate_all.py
      - run: git diff --exit-code
      - run: pytest -q
      - run: python tools/build_release_bundles.py
      - shell: bash
        run: |
          find dist/release -type f -print0 | sort -z | xargs -0 sha256sum > dist/release/RELEASE_BUNDLE_SHA256.txt
      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ steps.meta.outputs.rc_tag }}
          path: dist/release/**
      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target_commit="$(git rev-parse HEAD)"
          gh release create "${{ steps.meta.outputs.rc_tag }}"             dist/release/pypi/*             dist/release/npm/*             dist/release/crates/*             dist/release/manifest.json             dist/release/checksums.txt             dist/release/VERSION             dist/release/RELEASE_BUNDLE_SHA256.txt             --target "$target_commit"             --title "Release Candidate ${{ steps.meta.outputs.rc_tag }}"             --notes "Generated, tested, and promoted release-candidate bundle for version ${{ steps.meta.outputs.version }}."             --prerelease
