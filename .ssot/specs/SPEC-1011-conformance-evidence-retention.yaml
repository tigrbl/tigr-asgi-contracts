body: |-
  ## Scope
  
  This specification defines conformance evidence retention.
  
  ## Requirements
  
  Conformance evidence is retained as SSOT evidence rows and referenced artifacts.
  
  Promotion and release snapshots must include SHA-256 hashes for core artifacts: canonical schemas, generated contract/package outputs, `.ssot/registry.json`, evidence artifacts, release manifests, and promoted bundle manifests.
  
  Evidence rows must connect claims, tests, target features, boundaries, and releases to the artifacts that proved them.
  
  ## Validation
  
  Promotion and release review must be able to compare retained SHA-256 hashes rather than relying on mutable workspace state.
