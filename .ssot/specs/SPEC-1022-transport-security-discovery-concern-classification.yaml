body: |-
  ## Scope
  
  This specification governs normalized `concern:<concern>` candidates for transport, security, discovery, and HTTP-adjacent surfaces.
  
  ## Requirements
  
  TLS, mTLS, ALPN, ECH, Alt-Svc, SVCB, HTTPS DNS record, HTTPS/SVCB, HTTP/3 advertisement, proxy forwarding, redirect, upgrade, trailers, and early hints remain distinct concerns.
  
  These concerns do not become ASGI scope types by default.
  
  Scope schemas may reference derived or negotiated facts only when this repository explicitly owns the contract schema shape.
  
  Runtime trust behavior, certificate validation behavior, DNS resolution behavior, server advertisement behavior, redirect following, upgrade handling, and trailer emission behavior remain downstream unless separately governed.
  
  ## Validation
  
  Promotion must not merge distinct concerns into a generic transport-extension feature and must not create new ASGI scope types without another accepted decision.
