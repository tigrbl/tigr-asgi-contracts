body: |-
  ## Scope
  
  This specification governs normalized feature candidates whose surface key is `schema:<schema_path>`.
  
  ## Requirements
  
  Schema candidates promote one schema path at a time.
  
  Existing root schema features remain distinct current registry rows. Proposed extension schema paths remain separate future candidates with provenance to their source rows.
  
  Root schemas, child schemas, extension schemas, frame schemas, framing schemas, and legacy/current path pairs must remain distinguishable during review.
  
  Absent proposed schema candidates default to future review candidates unless a later decision rejects or supersedes them.
  
  Schema promotion does not imply runtime behavior ownership. It governs schema shape, generated types, fixtures, validation metadata, and evidence surfaces.
  
  ## Validation
  
  A promoted schema candidate must preserve its source schema path and must not collapse proposed extension paths into existing root schema features without an explicit supersession decision.
