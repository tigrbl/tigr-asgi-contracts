name: generate-bindings
on:
  workflow_dispatch:
  push:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -q PyYAML
      - run: python tools/generate_all.py
