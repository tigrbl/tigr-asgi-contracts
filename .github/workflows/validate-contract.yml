name: validate-contract

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

jobs:
  validate-artifacts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -q PyYAML jsonschema tomli
      - run: python tools/validate_yaml.py
      - run: python tools/validate_jsonschema.py
      - run: python tools/build_manifest.py
      - run: python tools/build_checksums.py
      - run: git diff --exit-code -- contract/manifest.json contract/checksums.txt

  verify-generated-clean:
    needs: validate-artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -q PyYAML jsonschema tomli
      - run: python tools/generate_all.py
      - run: git diff --exit-code
