automata:
  request:
    initial: idle
    terminal:
    - closed
    - disconnected
    transitions:
    - from: idle
      event: request.open
      to: open
    - from: open
      event: request.body_in
      to: open
    - from: open
      event: request.chunk_in
      to: open
    - from: open
      event: request.close
      to: body_closed
    - from: open
      event: request.dispatch
      to: dispatched
    - from: body_closed
      event: request.dispatch
      to: dispatched
    - from: dispatched
      event: response.open
      to: responding
    - from: responding
      event: response.body_out
      to: responding
    - from: responding
      event: response.chunk_out
      to: responding
    - from: responding
      event: response.emit_complete
      to: completing
    - from: completing
      event: response.finalize
      to: closed
    - from: open
      event: request.disconnect
      to: disconnected
    - from: body_closed
      event: request.disconnect
      to: disconnected
  session:
    initial: idle
    terminal:
    - closed
    - disconnected
    - rejected
    transitions:
    - from: idle
      event: session.open
      to: open
    - from: open
      event: session.accept
      to: accepted
    - from: open
      event: session.reject
      to: rejected
    - from: open
      event: session.disconnect
      to: disconnected
    - from: accepted
      event: session.ready
      to: ready
    - from: accepted
      event: session.disconnect
      to: disconnected
    - from: ready
      event: session.heartbeat
      to: ready
    - from: ready
      event: session.sync
      to: ready
    - from: ready
      event: session.emit_complete
      to: ready
    - from: ready
      event: session.close
      to: closed
    - from: ready
      event: session.disconnect
      to: disconnected
  message:
    initial: idle
    terminal:
    - complete
    - failed
    transitions:
    - from: idle
      event: message.in
      to: received
    - from: received
      event: message.decode
      to: decoded
    - from: received
      event: message.decode_failed
      to: failed
    - from: decoded
      event: message.handle
      to: handled
    - from: decoded
      event: message.handle_failed
      to: failed
    - from: handled
      event: message.out
      to: emitted
    - from: emitted
      event: message.emit_complete
      to: complete
    - from: emitted
      event: message.emit_failed
      to: failed
    - from: complete
      event: message.replay
      to: emitted
    - from: complete
      event: message.snapshot
      to: complete
  stream:
    initial: idle
    terminal:
    - closed
    - reset
    - stopped
    transitions:
    - from: idle
      event: stream.open
      to: open
    - from: open
      event: stream.chunk_in
      to: open
    - from: open
      event: stream.chunk_out
      to: open
    - from: open
      event: stream.flush
      to: open
    - from: open
      event: stream.finalize
      to: finalizing
    - from: finalizing
      event: stream.emit_complete
      to: closed
    - from: open
      event: stream.close
      to: closed
    - from: open
      event: stream.reset
      to: reset
    - from: open
      event: stream.stop_sending
      to: stopped
    - from: finalizing
      event: stream.reset
      to: reset
    - from: finalizing
      event: stream.stop_sending
      to: stopped
  datagram:
    initial: idle
    terminal:
    - complete
    - failed
    transitions:
    - from: idle
      event: datagram.in
      to: received
    - from: received
      event: datagram.handle
      to: handled
    - from: handled
      event: datagram.out
      to: emitted
    - from: emitted
      event: datagram.emit_complete
      to: complete
    - from: emitted
      event: datagram.emit_failed
      to: failed
  lifespan:
    initial: idle
    terminal:
    - startup_complete
    - startup_failed
    - shutdown_complete
    - shutdown_failed
    transitions:
    - from: idle
      event: lifespan.startup
      to: starting
    - from: starting
      event: lifespan.startup_complete
      to: startup_complete
    - from: starting
      event: lifespan.startup_failed
      to: startup_failed
    - from: startup_complete
      event: lifespan.shutdown
      to: shutting_down
    - from: idle
      event: lifespan.shutdown
      to: shutting_down
    - from: shutting_down
      event: lifespan.shutdown_complete
      to: shutdown_complete
    - from: shutting_down
      event: lifespan.shutdown_failed
      to: shutdown_failed
