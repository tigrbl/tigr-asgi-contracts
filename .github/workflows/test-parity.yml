name: CI / Parity Matrix
run-name: CI / Parity Matrix / ${{ github.event_name }} / ${{ github.event.pull_request.number || github.ref_name }}

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  schedule:
    - cron: '30 09 * * *'

concurrency:
  group: test-parity-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  parity-python:
    name: Python parity (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen --python ${{ matrix.python-version }}
      - run: uv run --frozen python tools/generate_all.py
      - run: git diff --exit-code
      - run: uv run --frozen python -m pytest -q

  parity-node:
    name: Node package parity (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['21', '22', '23', '24', '25']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
      - run: mkdir -p dist/npm
      - name: Pack artifact npm package
        working-directory: packages/artifacts-npm
        run: npm pack --pack-destination ../../dist/npm
      - name: Pack contract npm package
        working-directory: packages/contract-npm
        run: npm pack --pack-destination ../../dist/npm
      - name: Verify npm bundles were produced
        shell: bash
        run: |
          test -f dist/npm/tigr-contract-artifacts-*.tgz
          test -f dist/npm/tigr-asgi-contract-*.tgz

  parity-rust:
    name: Rust crate parity (Rust ${{ matrix.rust-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust-version: ['1.91.0', '1.92.0', '1.93.0', '1.94.0', '1.95.0']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust-version }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v7
      - run: uv run --no-project --python 3.10 python packages/artifacts-rs/scripts/vendor_contract.py
      - run: cargo check --manifest-path packages/contract-rs/Cargo.toml
      - run: cargo check --manifest-path packages/artifacts-rs/Cargo.toml
      - run: cargo package --manifest-path packages/contract-rs/Cargo.toml --allow-dirty --no-verify
      - run: cargo package --manifest-path packages/artifacts-rs/Cargo.toml --allow-dirty --no-verify
      - run: rm -rf packages/artifacts-rs/contract
