name: test-parity

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -q pytest pydantic pyyaml jsonschema
      - run: python tools/generate_all.py
      - run: git diff --exit-code
      - run: pytest -q
