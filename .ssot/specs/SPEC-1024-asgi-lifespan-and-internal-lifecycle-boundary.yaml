body: |-
  ## Scope
  
  This specification governs ASGI lifespan event candidates and internal `lifecycle.*` classification candidates.
  
  ## Requirements
  
  `lifespan.startup`, `lifespan.startup.complete`, `lifespan.startup.failed`, `lifespan.shutdown`, `lifespan.shutdown.complete`, and `lifespan.shutdown.failed` are ASGI-facing event and schema surfaces.
  
  `lifespan.startup.failed` and `lifespan.shutdown.failed` remain ASGI-facing surfaces even though runtime emission behavior is downstream.
  
  Internal `lifecycle.*` rows may become future feature candidates, but they do not become ASGI event features without another accepted decision.
  
  Runtime handler, context, drain, inflight, cleanup, and rejection behavior claims remain downstream and are not governed by this repository.
  
  ## Validation
  
  Promotion must distinguish ASGI lifespan event candidates from internal lifecycle candidates and must not use internal lifecycle candidates to claim runtime lifecycle behavior.
