body: |-
  ## Scope
  
  This specification defines accepted external interop evidence sources.
  
  ## Requirements
  
  Autobahn, Web Platform Tests, JSON Schema Test Suite, and downstream ASGI/runtime suites may be linked as SSOT evidence.
  
  External suites are optional accepted evidence until another target-specific specification makes them mandatory.
