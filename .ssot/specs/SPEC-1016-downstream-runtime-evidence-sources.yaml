body: |-
  ## Scope
  
  This specification defines downstream runtime evidence sources.
  
  ## Requirements
  
  The named downstream ASGI evidence-source set is tigrcorn, uvicorn, hypercorn, and gunicorn.
  
  These runtimes are evidence sources for this repository. They are not package outputs owned by this repository.
  
  Other runtimes are tracked as out of bounds when they appear in documentation, tests, issues, claims, or evidence discussions.
  
  ## Validation
  
  Runtime evidence rows must identify the runtime source when evidence is runtime-derived. Adding another runtime to the named set requires a future accepted decision.
