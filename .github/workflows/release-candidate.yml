name: release-candidate

on:
  workflow_call:
    inputs:
      ref_name:
        description: Branch or ref name to promote from
        required: false
        default: ""
        type: string
      create_github_release:
        description: Create a GitHub release for the current version tag
        required: false
        default: true
        type: boolean
      publish_to_pypi:
        description: Publish Python distributions for the current version
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      ref_name:
        description: Branch or ref name to promote from
        required: false
        default: ""
      create_github_release:
        description: Create a GitHub release for the current version tag
        required: true
        default: true
        type: boolean
      publish_to_pypi:
        description: Publish Python distributions for the current version
        required: true
        default: false
        type: boolean

concurrency:
  group: release-candidate-${{ inputs.ref_name != '' && inputs.ref_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref_name != '' && inputs.ref_name || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install -q pytest pydantic pyyaml jsonschema build
      - id: meta
        shell: bash
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          release_tag="tigr-asgi-contracts==${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
      - run: python tools/check_versions.py "${{ steps.meta.outputs.version }}"
      - run: python tools/validate_yaml.py
      - run: python tools/validate_jsonschema.py
      - run: python tools/generate_all.py
      - run: git diff --exit-code
      - run: pytest -q
      - run: python tools/build_release_bundles.py
      - shell: bash
        run: |
          find dist/release -type f -print0 | sort -z | xargs -0 sha256sum > dist/release/RELEASE_BUNDLE_SHA256.txt
      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ steps.meta.outputs.release_tag }}
          path: dist/release/**
      - name: Create GitHub release
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target_commit="$(git rev-parse HEAD)"
          extra_args=()
          if [[ "${{ steps.meta.outputs.version }}" == *"-dev"* ]]; then
            extra_args+=(--prerelease)
          fi
          gh release create "${{ steps.meta.outputs.release_tag }}"             dist/release/pypi/*             dist/release/npm/*             dist/release/crates/*             dist/release/manifest.json             dist/release/checksums.txt             dist/release/VERSION             dist/release/RELEASE_BUNDLE_SHA256.txt             --target "$target_commit"             --title "Release ${{ steps.meta.outputs.release_tag }}"             --notes "Generated, tested, and bundled release artifacts for version ${{ steps.meta.outputs.version }}."             "${extra_args[@]}"
      - name: Setup uv for PyPI publish
        if: ${{ inputs.publish_to_pypi }}
        uses: astral-sh/setup-uv@v7
      - name: Publish Python distributions to PyPI
        if: ${{ inputs.publish_to_pypi }}
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv publish dist/release/pypi/*.whl dist/release/pypi/*.tar.gz
