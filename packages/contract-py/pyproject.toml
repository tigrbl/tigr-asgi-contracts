[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "tigr-asgi-contract"
version = "0.3.1-dev1"
requires-python = ">=3.10"
description = "Generated Python contract bindings for the Tigr ASGI contract"
readme = "README.md"
license = { text = "Apache-2.0" }
dependencies = ["pydantic>=2.8"]

[tool.hatch.build.targets.wheel]
packages = ["src/tigr_asgi_contract"]
