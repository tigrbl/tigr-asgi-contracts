name: prepare-release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - finalize
      create_github_release:
        description: Create a GitHub release from the bumped version
        required: true
        default: true
        type: boolean
      publish_to_pypi:
        description: Publish Python distributions to PyPI from the bumped version
        required: true
        default: false
        type: boolean

concurrency:
  group: prepare-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Sync Python release tooling
        run: uv sync --frozen --python 3.10

      - name: Bump unified release version
        run: uv run --frozen python tools/bump_release_version.py --bump "${{ inputs.bump_type }}"

      - id: version
        name: Read bumped version
        shell: bash
        run: echo "version=$(tr -d '\r\n' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify bumped manifests
        run: uv run --frozen python tools/check_versions.py "${{ steps.version.outputs.version }}"

      - name: Regenerate versioned outputs and SSOT metadata
        run: uv run --frozen python tools/generate_all.py

      - name: Commit bumped versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"

  release-candidate:
    needs: bump-version
    uses: ./.github/workflows/release-candidate.yml
    with:
      ref_name: ${{ github.ref_name }}
      create_github_release: ${{ inputs.create_github_release }}
      publish_to_pypi: ${{ inputs.publish_to_pypi }}
    secrets: inherit
