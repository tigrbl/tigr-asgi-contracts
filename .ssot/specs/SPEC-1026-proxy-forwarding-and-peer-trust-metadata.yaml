body: |-
  ## Scope
  
  This specification governs proxy forwarding and peer trust metadata candidates.
  
  ## Requirements
  
  `Forwarded`, `X-Forwarded-*`, `X-Real-IP`, and PROXY protocol inputs are distinct metadata surfaces.
  
  This repository represents observed and provenance metadata only. Trust decisions, trusted proxy configuration, and client/server/scheme rewrites are downstream runtime behavior unless separately governed.
  
  Forwarded and proxy-derived values remain separate provenance surfaces from base ASGI `client`, `server`, and `scheme` fields.
  
  ## Validation
  
  Promoted proxy metadata candidates must not overwrite canonical ASGI peer fields or imply trusted-proxy runtime behavior.
