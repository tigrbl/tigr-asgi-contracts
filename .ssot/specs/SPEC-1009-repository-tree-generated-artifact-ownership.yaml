body: |-
  ## Scope
  
  This specification defines repository tree ownership for canonical inputs, governance sources, generated/package outputs, and documentation projections.
  
  ## Requirements
  
  The `contract/` tree is the canonical source for contract vocabulary, schemas, matrices, compatibility metadata, manifests, and checksums.
  
  The `.ssot/` tree is the canonical governance source for ADRs, SPECs, registry entities, claims, evidence, boundaries, releases, reports, and generated SSOT exports.
  
  Generated language packages, package readmes, release bundles, and generated documentation are projections of canonical inputs. Generated outputs must not be hand-edited as the source of truth for contract semantics.
  
  Documentation explains and projects SSOT and contract decisions. When documentation conflicts with `.ssot/` or `contract/`, the canonical SSOT and contract sources win.
  
  ## Validation
  
  Contract changes start in canonical contract files and are propagated through generation. SSOT governance changes start in SSOT documents or entities through SSOT tooling.
