body: |-
  ## Context
  
  Conformance and interop evidence must survive beyond a single CI run if it is used to certify, promote, release, or publish a governed target.
  
  ## Decision
  
  Conformance evidence shall be retained as SSOT evidence rows and durable evidence artifacts under the configured SSOT evidence roots.
  
  Boundary and release snapshots shall include hashes for evidence used to support certification, promotion, release, and publication decisions.
  
  CI artifacts may supplement SSOT evidence, but CI artifacts alone are not sufficient for durable conformance certification.
  
  ## Consequences
  
  Release decisions can be audited after CI artifacts expire.
  
  External-suite evidence can be linked into claims and snapshots when target-specific gates require it.
