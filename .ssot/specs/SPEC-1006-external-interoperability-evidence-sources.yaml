body: |-
  ## Scope
  
  This specification defines external interoperability evidence sources.
  
  ## Requirements
  
  Accepted external evidence sources include Autobahn, Web Platform Tests, JSON Schema Test Suite, and downstream ASGI suites.
  
  External suite target rows remain planned or future until durable evidence rows exist.
  
  External suite evidence is optional below T4. Applicable external-suite evidence is required for T4 conformance or certification.
  
  ## Validation
  
  External evidence rows must identify the suite, target, version or commit where available, artifact location, and linked feature or claim.
