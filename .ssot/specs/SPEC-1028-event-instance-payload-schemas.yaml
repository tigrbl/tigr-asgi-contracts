body: |-
  ## Scope
  
  This specification governs event-instance payload schema surfaces for every current TransportEventType and contract event type.
  
  ## Requirements
  
  Each TransportEventType must have a discriminated payload schema or an explicit empty-payload schema.
  
  Event payload schemas must define required fields, forbidden fields, allowed nullable fields, and mutual exclusion constraints when the event semantics require them.
  
  Event payload schemas must prevent cross-family leakage, including stream identifiers on non-stream events and datagram identifiers on non-datagram events.
  
  Payload schemas own classification discriminators when one canonical event can represent multiple lanes. Required discriminators include WebTransport stream direction and stream id for stream events, datagram metadata for datagram events, WebSocket selected subprotocol and framing where relevant, and HTTP streaming continuation or completion flags where relevant.
  
  Payload schemas must validate framing-specific requirements for `json`, `jsonrpc`, `ndjson`, `sse`, `text`, `bytes`, and `binary` whenever a selected binding or lane declares those framings.
  
  `jsonrpc` payload schemas must require complete JSON-RPC message semantics and must not be selected by `json` or `ndjson` alone.
  
  `ndjson` payload schemas must validate line-delimited JSON record boundaries and must not imply JSON-RPC semantics.
  
  `sse` payload schemas must remain exclusive to SSE binding rows.
  
  Generated Python, TypeScript, and Rust bindings must expose event payload models without collapsing them back into an untyped dictionary-only contract.
  
  Existing event type features remain event-presence features. New event-payload features track the payload semantics separately.
  
  Payload validation must not require a `subsurface` event-name field. Discrimination is based on canonical event type plus scope, channel, binding, framing, and payload metadata.
  
  ## Validation
  
  Contract validation must prove that the root event schema dispatches to the correct event payload schema by event type.
  
  Codegen parity tests must prove that generated languages expose the same event payload surface and preserve schema-required fields.
  
  Negative tests must reject missing stream direction on WebTransport stream events, datagram metadata on non-datagram events, and framing metadata that is illegal for the selected binding.
