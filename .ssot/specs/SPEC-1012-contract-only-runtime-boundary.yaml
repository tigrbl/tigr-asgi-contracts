body: |-
  ## Scope
  
  This specification defines the runtime boundary for this repository.
  
  ## Requirements
  
  In-scope surfaces are schemas, types, values, generated contracts, SSOT rows, evidence metadata, and deterministic snapshots.
  
  Out-of-scope surfaces are downstream runtime emission behavior, cleanup behavior, lifecycle execution, connection drain, session handling, and server behavior.
  
  Contract schema versions must be bumped when JSON schema wire shape or generated contract APIs change.
  
  SSOT registry schema upgrades must be performed through SSOT CLI tooling.
  
  ## Validation
  
  Contract rows and tests must not claim downstream runtime behavior unless a future accepted ADR and SPEC expand this repository's scope.
