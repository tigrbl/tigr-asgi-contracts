name: Release / Prepare Version
run-name: Release / Prepare Version / ${{ inputs.bump_type }} / ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - finalize
      create_github_release:
        description: Create a GitHub release from the bumped version
        required: true
        default: true
        type: boolean
      publish_to_pypi:
        description: Publish Python distributions to PyPI from the bumped version
        required: true
        default: false
        type: boolean
      publish_to_npmjs:
        description: Publish npm distributions to npmjs from the bumped version
        required: true
        default: false
        type: boolean
      publish_to_crates:
        description: Publish Rust crates to crates.io from the bumped version
        required: true
        default: false
        type: boolean

concurrency:
  group: prepare-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  bump-version:
    name: Bump version metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_ref: ${{ steps.commit.outputs.release_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Sync Python release tooling
        run: uv sync --frozen --python 3.10

      - name: Bump unified release version
        run: uv run --frozen python tools/bump_release_version.py --bump "${{ inputs.bump_type }}"

      - id: version
        name: Read bumped version
        shell: bash
        run: echo "version=$(tr -d '\r\n' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify bumped manifests
        run: uv run --frozen python tools/check_versions.py "${{ steps.version.outputs.version }}"

      - id: commit
        name: Commit bumped versions
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes were generated; skipping commit."
          else
            git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
          echo "release_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  release-candidate:
    name: Trigger release candidate workflow
    needs: bump-version
    uses: ./.github/workflows/release-candidate.yml
    with:
      ref_name: ${{ needs.bump-version.outputs.release_ref }}
      create_github_release: ${{ inputs.create_github_release }}
      publish_to_pypi: ${{ inputs.publish_to_pypi }}
      publish_to_npmjs: ${{ inputs.publish_to_npmjs }}
      publish_to_crates: ${{ inputs.publish_to_crates }}
    secrets: inherit
