name: Release / Build Candidate
run-name: Release / Build Candidate / ${{ inputs.ref_name != '' && inputs.ref_name || github.ref_name }}

on:
  workflow_call:
    inputs:
      ref_name:
        description: Branch or ref name to promote from
        required: false
        default: ""
        type: string
      create_github_release:
        description: Create a GitHub release for the current version tag
        required: false
        default: true
        type: boolean
      publish_to_pypi:
        description: Publish Python distributions for the current version
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      ref_name:
        description: Branch or ref name to promote from
        required: false
        default: ""
      create_github_release:
        description: Create a GitHub release for the current version tag
        required: true
        default: true
        type: boolean
      publish_to_pypi:
        description: Publish Python distributions for the current version
        required: true
        default: false
        type: boolean

concurrency:
  group: release-candidate-${{ inputs.ref_name != '' && inputs.ref_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-python:
    name: Verify Python matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref_name != '' && inputs.ref_name || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen --python ${{ matrix.python-version }}
      - run: uv run --frozen python tools/check_versions.py
      - run: uv run --frozen python tools/validate_yaml.py
      - run: uv run --frozen python tools/validate_jsonschema.py
      - run: uv run --frozen python tools/generate_all.py
      - run: git diff --exit-code
      - run: uv run --frozen python -m pytest -q

  verify-node:
    name: Verify Node matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['21', '22', '23', '24', '25']
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref_name != '' && inputs.ref_name || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
      - run: mkdir -p dist/npm
      - name: Pack artifact npm package
        working-directory: packages/artifacts-npm
        run: npm pack --pack-destination ../../dist/npm
      - name: Pack contract npm package
        working-directory: packages/contract-npm
        run: npm pack --pack-destination ../../dist/npm
      - name: Verify npm bundles were produced
        shell: bash
        run: |
          test -f dist/npm/tigr-contract-artifacts-*.tgz
          test -f dist/npm/tigr-asgi-contract-*.tgz

  verify-rust:
    name: Verify Rust matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust-version: ['1.91.0', '1.92.0', '1.93.0', '1.94.0', '1.95.0']
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref_name != '' && inputs.ref_name || github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust-version }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v7
      - run: uv run --no-project --python 3.10 python packages/artifacts-rs/scripts/vendor_contract.py
      - run: cargo check --manifest-path packages/contract-rs/Cargo.toml
      - run: cargo check --manifest-path packages/artifacts-rs/Cargo.toml
      - run: cargo package --manifest-path packages/contract-rs/Cargo.toml --allow-dirty --no-verify
      - run: cargo package --manifest-path packages/artifacts-rs/Cargo.toml --allow-dirty --no-verify
      - run: rm -rf packages/artifacts-rs/contract

  build-release:
    name: Build release bundle
    needs: [verify-python, verify-node, verify-rust]
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref_name != '' && inputs.ref_name || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '25'
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.95.0'
      - run: uv sync --frozen --python 3.10
      - id: meta
        shell: bash
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          release_tag="tigr-asgi-contracts==${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
      - run: uv run --frozen python tools/check_versions.py "${{ steps.meta.outputs.version }}"
      - run: uv run --frozen python tools/validate_yaml.py
      - run: uv run --frozen python tools/validate_jsonschema.py
      - run: uv run --frozen python tools/generate_all.py
      - run: git diff --exit-code
      - run: uv run --frozen python tools/build_release_bundles.py
      - shell: bash
        run: |
          find dist/release -type f -print0 | sort -z | xargs -0 sha256sum > dist/release/RELEASE_BUNDLE_SHA256.txt
      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ steps.meta.outputs.release_tag }}
          path: dist/release/**
      - name: Create GitHub release
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target_commit="$(git rev-parse HEAD)"
          extra_args=()
          if [[ "${{ steps.meta.outputs.version }}" == *"-dev"* ]]; then
            extra_args+=(--prerelease)
          fi
          gh release create "${{ steps.meta.outputs.release_tag }}" \
            dist/release/pypi/* \
            dist/release/npm/* \
            dist/release/crates/* \
            dist/release/manifest.json \
            dist/release/checksums.txt \
            dist/release/VERSION \
            dist/release/RELEASE_BUNDLE_SHA256.txt \
            --target "$target_commit" \
            --title "Release ${{ steps.meta.outputs.release_tag }}" \
            --notes "Generated, tested, and bundled release artifacts for version ${{ steps.meta.outputs.version }}." \
            "${extra_args[@]}"
      - name: Setup uv for PyPI publish
        if: ${{ inputs.publish_to_pypi }}
        uses: astral-sh/setup-uv@v7
      - name: Publish Python distributions to PyPI
        if: ${{ inputs.publish_to_pypi }}
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv publish dist/release/pypi/*.whl dist/release/pypi/*.tar.gz
