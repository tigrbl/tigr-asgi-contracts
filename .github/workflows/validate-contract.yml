name: CI / Validate Contract
run-name: CI / Validate Contract / ${{ github.event_name }} / ${{ github.event.pull_request.number || github.ref_name }}

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  schedule:
    - cron: '0 09 * * *'
  workflow_dispatch:

concurrency:
  group: validate-contract-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-artifacts:
    name: Validate contract artifacts (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen --python ${{ matrix.python-version }}
      - run: uv run --frozen python tools/validate_yaml.py
      - run: uv run --frozen python tools/validate_jsonschema.py
      - run: uv run --frozen python tools/build_manifest.py
      - run: uv run --frozen python tools/build_checksums.py
      - run: git diff --exit-code -- contract/manifest.json contract/checksums.txt

  verify-generated-clean:
    name: Verify generated outputs clean (Python ${{ matrix.python-version }})
    needs: validate-artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen --python ${{ matrix.python-version }}
      - run: uv run --frozen python tools/generate_all.py
      - run: git diff --exit-code
