name: prepare-release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      run_release_candidate:
        description: Run release-candidate after bumping versions
        required: true
        default: true
        type: boolean
      rc_tag:
        description: Optional prerelease tag override when running release-candidate
        required: false
        default: ""
        type: string

concurrency:
  group: prepare-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Bump unified release version
        run: python tools/bump_release_version.py --bump "${{ inputs.bump_type }}"

      - id: version
        name: Read bumped version
        shell: bash
        run: echo "version=$(tr -d '\r\n' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify bumped manifests
        run: python tools/check_versions.py "${{ steps.version.outputs.version }}"

      - name: Commit bumped versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION packages/artifacts-py/pyproject.toml packages/contract-py/pyproject.toml packages/artifacts-npm/package.json packages/contract-npm/package.json packages/artifacts-rs/Cargo.toml packages/contract-rs/Cargo.toml
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"

  release-candidate:
    needs: bump-version
    if: ${{ inputs.run_release_candidate }}
    uses: ./.github/workflows/release-candidate.yml
    with:
      ref_name: ${{ github.ref_name }}
      rc_tag: ${{ inputs.rc_tag }}
    secrets: inherit
