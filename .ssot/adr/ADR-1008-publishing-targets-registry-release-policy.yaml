body: |-
  ## Context
  
  The repository publishes generated artifacts to GitHub Releases, PyPI, npmjs, and crates.io. Publishing needs strict verification so released packages correspond to promoted artifacts rather than local or unverified builds.
  
  ## Decision
  
  Publishing must use promoted artifacts and strict verification for GitHub Releases, PyPI, npmjs, and crates.io.
  
  Workflow and documentation secret names must align on the workflow names: `PYPI_API_TOKEN`, `NPM_API_TOKEN`, and `CRATES_API_TOKEN`.
  
  `cargo publish --no-verify` is not part of the final strict publish policy. ADR-1017 records it as temporary debt and blocks crates.io publish target implementation while it remains.
  
  ## Consequences
  
  Publish workflows and docs can be audited against one secret-name set.
  
  The crates.io target remains partial until cargo verification is strict and evidenced.
