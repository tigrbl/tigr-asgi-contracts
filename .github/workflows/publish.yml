name: Release / Publish Artifacts
run-name: Release / Publish Artifacts / ${{ inputs.rc_tag }}

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: Promoted release tag to publish from
        required: true
      create_github_release:
        description: Create a GitHub release for the promoted version
        required: true
        default: true
        type: boolean
      npm_release_count:
        description: Number of recent release bundles to publish to npm
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
      publish_to_pypi:
        description: Publish Python distributions to PyPI
        required: true
        default: true
        type: boolean
      publish_to_npmjs:
        description: Publish npm distributions to npmjs
        required: true
        default: true
        type: boolean
      publish_to_crates:
        description: Publish Rust crates to crates.io
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-and-release-${{ inputs.rc_tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-pypi:
    name: Publish Python distributions
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_to_pypi }}
    steps:
      - name: Download promoted assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/promoted
          gh release download "${{ inputs.rc_tag }}" --dir dist/promoted
      - uses: astral-sh/setup-uv@v7
      - env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv publish dist/promoted/*.whl dist/promoted/*.tar.gz

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_to_npmjs }}
    steps:
      - name: Download promoted assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p dist/promoted/current
          gh release download "${{ inputs.rc_tag }}" --dir dist/promoted/current
      - name: Download previous npm release bundles
        if: ${{ inputs.npm_release_count != '1' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CURRENT_TAG: ${{ inputs.rc_tag }}
          NPM_RELEASE_COUNT: ${{ inputs.npm_release_count }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          current_tag = os.environ["CURRENT_TAG"]
          count = max(int(os.environ["NPM_RELEASE_COUNT"]) - 1, 0)
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/releases?per_page=20",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "User-Agent": "tigr-asgi-contracts-release-workflow",
              },
          )
          with urllib.request.urlopen(request) as response:
              payload = json.load(response)
          tags = []
          for release in payload:
              if release.get("draft"):
                  continue
              tag = release.get("tag_name", "")
              if not tag.startswith("tigr-asgi-contracts=="):
                  continue
              if tag == current_tag:
                  continue
              tags.append(tag)
          Path("dist/promoted/recent_tags.txt").write_text("\n".join(tags[:count]), encoding="utf-8")
          PY
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            safe_tag=$(printf '%s' "$tag" | tr -c 'A-Za-z0-9._-' '_')
            mkdir -p "dist/promoted/$safe_tag"
            gh release download "$tag" --pattern "*.tgz" --dir "dist/promoted/$safe_tag"
          done < dist/promoted/recent_tags.txt
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          uv run --no-project --python 3.10 python tools/publish_npm_tarballs.py --root dist/promoted

  publish-crates:
    name: Publish Rust crates
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_to_crates }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen --python 3.10
      - env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target_commit=$(gh release view "${{ inputs.rc_tag }}" --json targetCommitish --jq '.targetCommitish')
          git checkout "$target_commit"
      - run: uv run --frozen python tools/check_versions.py
      - run: uv run --frozen python tools/generate_all.py
      - run: git diff --exit-code
      - run: uv run --no-project --python 3.10 python packages/artifacts-rs/scripts/vendor_contract.py
      - env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --manifest-path packages/artifacts-rs/Cargo.toml --allow-dirty --no-verify
          cargo publish --manifest-path packages/contract-rs/Cargo.toml --allow-dirty --no-verify
      - run: rm -rf packages/artifacts-rs/contract

  finalize-release:
    name: Finalize GitHub release
    needs: [publish-pypi, publish-npm, publish-crates]
    runs-on: ubuntu-latest
    if: ${{ always() && inputs.create_github_release && contains(fromJSON('["success","skipped"]'), needs.publish-pypi.result) && contains(fromJSON('["success","skipped"]'), needs.publish-npm.result) && contains(fromJSON('["success","skipped"]'), needs.publish-crates.result) }}
    steps:
      - uses: actions/checkout@v4
      - name: Download promoted assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/promoted
          gh release download "${{ inputs.rc_tag }}" --dir dist/promoted
      - name: Create final GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target_commit=$(gh release view "${{ inputs.rc_tag }}" --json targetCommitish --jq '.targetCommitish')
          version=$(tr -d '\r\n' < dist/promoted/VERSION)
          final_tag="tigr-asgi-contracts==${version}"
          if ! git ls-remote --tags origin "$final_tag" | grep -q "$final_tag"; then
            git config user.name github-actions
            git config user.email github-actions@users.noreply.github.com
            git fetch --tags
            git tag "$final_tag" "$target_commit"
            git push origin "$final_tag"
          fi
          extra_args=(--latest)
          if [[ "$version" == *"-dev"* ]]; then
            extra_args+=(--prerelease)
          fi
          gh release create "$final_tag"             dist/promoted/*             --target "$target_commit"             --title "Release $final_tag"             --notes "Published from promoted release candidate ${{ inputs.rc_tag }}."             "${extra_args[@]}"
