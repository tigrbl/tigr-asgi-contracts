body: |-
  ## Scope
  
  This specification governs normalized feature candidates and classification rows whose canonical shape is `event + channel + scope_type + binding + family + exchange + direction`.
  
  ## Requirements
  
  Multi-scope rows preserve the combined scope set as the governed surface when the normalized matrix deduped them that way.
  
  Binding legality values `R`, `O`, `D`, and `F` are preserved as legality facts. They do not collapse into implementation status.
  
  `D` is an allowed non-forbidden legality fact that requires review and documentation.
  
  Valid matrix rows may become feature candidates. Invalid cartesian permutations remain rejection or provenance rows under SPEC-1018.
  
  Event, channel, scope type, binding, family, exchange, and direction remain separate taxonomy attributes.
  
  Canonical event identity remains the ASGI or contract event name. The classification matrix must not require a duplicate `subsurface` event name to distinguish lanes.
  
  Where one event name can represent multiple lanes, row selection uses scope metadata and payload discriminators such as stream direction, stream id, datagram id, selected subprotocol, ALPN, TLS metadata, or WebTransport capability metadata.
  
  ## Validation
  
  A promoted classification candidate must retain its legality columns and must not discard `O` or `D` facts when deriving implementation status or planning horizon.
  
  Matrix generation must fail closed when `channel`, `family`, `exchange`, or `direction` cannot be derived from the canonical event, scope metadata, binding, and required payload discriminators.
