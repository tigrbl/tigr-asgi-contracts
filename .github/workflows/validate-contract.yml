name: validate-contract
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python tools/validate_yaml.py
      - run: python tools/validate_jsonschema.py
      - run: python tools/build_manifest.py
      - run: python tools/build_checksums.py
