body: |-
  ## Scope
  
  This specification defines frame and payload target semantics for JSON, canonical JSON, JSON-RPC, and duplicate-key policy.
  
  ## Requirements
  
  JSON payload and schema surfaces target RFC 8259.
  
  Canonical repository artifacts target RFC 8785 JCS.
  
  JSON-RPC target features cover full JSON-RPC 2.0 behavior.
  
  Duplicate JSON object keys are rejected in canonical contract inputs and deterministic artifact paths.
