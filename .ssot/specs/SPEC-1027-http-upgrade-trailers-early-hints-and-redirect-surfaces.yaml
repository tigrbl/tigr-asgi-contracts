body: |-
  ## Scope
  
  This specification governs HTTP-adjacent candidates for trailers, early hints, redirects, and upgrades.
  
  ## Requirements
  
  Trailers are represented through the future `http.response.trailers` event surface plus shared header-pair and header-list schemas.
  
  Early hints are classified as HTTP informational response metadata, not runtime emission behavior.
  
  Redirects and upgrades are classified as status and header metadata surfaces.
  
  Redirect following, upgrade handling, trailer emission, and early-hints emission behavior remain downstream runtime behavior unless separately governed.
  
  ## Validation
  
  Promoted HTTP-adjacent candidates must preserve the distinction between metadata/schema surfaces and runtime behavior.
