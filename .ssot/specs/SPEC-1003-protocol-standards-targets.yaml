body: |-
  ## Scope
  
  This specification defines protocol standards targets for HTTP, WebSocket, SSE, WebTransport, QUIC, and HTTP Datagrams.
  
  ## Requirements
  
  HTTP target features cover RFC 9110, RFC 9112, RFC 9113, and RFC 9114.
  
  WebSocket target features cover RFC 6455, RFC 8441, and RFC 9220.
  
  SSE target features cover WHATWG EventSource behavior.
  
  WebTransport target features cover W3C WebTransport API shape, WebTransport over HTTP/3, QUIC, and HTTP Datagrams/Capsule behavior.
