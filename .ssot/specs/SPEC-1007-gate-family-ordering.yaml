body: |-
  ## Scope
  
  This specification defines gate family target ordering.
  
  ## Requirements
  
  Gate families are conformance, certification, promotion, release, and publish.
  
  Gate family target features are ordered in that sequence.
  
  Each gate family may have independent claims, tests, and evidence.
