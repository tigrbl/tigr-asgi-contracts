body: |-
  ## Scope
  
  This specification defines publishing target policy for GitHub Releases, PyPI, npmjs, and crates.io.
  
  ## Requirements
  
  Publishing uses promoted artifacts or promoted source tags and commits.
  
  Workflows must align secret names and supported runtime versions.
  
  Release-gated Cargo publication must not use `cargo publish --no-verify`.
