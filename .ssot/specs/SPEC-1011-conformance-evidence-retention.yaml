body: |-
  ## Scope
  
  This specification defines durable conformance evidence retention.
  
  ## Requirements
  
  Conformance evidence used for certification, promotion, release, or publication is retained as SSOT evidence rows and durable artifacts.
  
  Boundary and release snapshots include hashes for retained evidence.
  
  CI-only artifacts are supplemental and do not replace durable SSOT evidence.
