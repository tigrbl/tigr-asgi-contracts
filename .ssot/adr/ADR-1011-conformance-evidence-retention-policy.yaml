body: |-
  ## Context
  
  Conformance evidence must remain inspectable after target, boundary, release, and publication decisions. The repository needs a retention rule that preserves the proof chain without treating transient CI logs as the only source of truth.
  
  ## Decision
  
  Conformance evidence is retained as SSOT evidence rows and referenced artifacts.
  
  Promotion and release snapshots must include SHA-256 hashes for core artifacts: canonical schemas, generated contract/package outputs, `.ssot/registry.json`, evidence artifacts, release manifests, and promoted bundle manifests.
  
  Evidence rows must be sufficient to connect claims, tests, target features, boundaries, and releases to the artifacts that proved them.
  
  ## Consequences
  
  Boundary and release review can compare stable hashes rather than relying on mutable workspace state.
  
  Publication can trace back to promoted artifacts and retained evidence.
