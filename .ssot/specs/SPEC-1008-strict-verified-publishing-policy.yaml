body: |-
  ## Scope
  
  This specification defines strict verified publishing policy.
  
  ## Requirements
  
  Publishing must use promoted artifacts for GitHub Releases, PyPI, npmjs, and crates.io.
  
  Workflow and documentation secret names must align on `PYPI_API_TOKEN`, `NPM_API_TOKEN`, and `CRATES_API_TOKEN`.
  
  Publish workflows must preserve artifact provenance from promotion through publication.
  
  Strict publish policy does not allow `cargo publish --no-verify` as a final implemented state. SPEC-1017 defines the temporary debt threshold for crates.io.
  
  ## Validation
  
  Publish claims must link to workflow-backed evidence showing verification commands, promoted artifact provenance, registry target, and result.
