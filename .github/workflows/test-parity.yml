name: test-parity

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

jobs:
  parity-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -q pytest pydantic pyyaml jsonschema tomli
      - run: python tools/generate_all.py
      - run: git diff --exit-code
      - run: python -m pytest -q

  parity-node:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['21', '22', '23', '24', '25']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
      - run: mkdir -p dist/npm
      - name: Pack artifact npm package
        working-directory: packages/artifacts-npm
        run: npm pack --pack-destination ../../dist/npm
      - name: Pack contract npm package
        working-directory: packages/contract-npm
        run: npm pack --pack-destination ../../dist/npm
      - name: Verify npm bundles were produced
        shell: bash
        run: |
          test -f dist/npm/tigr-contract-artifacts-*.tgz
          test -f dist/npm/tigr-asgi-contract-*.tgz

  parity-rust:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust-version: ['1.91.0', '1.92.0', '1.93.0', '1.94.0', '1.95.0']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust-version }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: python packages/artifacts-rs/scripts/vendor_contract.py
      - run: cargo check --manifest-path packages/contract-rs/Cargo.toml
      - run: cargo check --manifest-path packages/artifacts-rs/Cargo.toml
      - run: cargo package --manifest-path packages/contract-rs/Cargo.toml --allow-dirty --no-verify
      - run: cargo package --manifest-path packages/artifacts-rs/Cargo.toml --allow-dirty --no-verify
      - run: rm -rf packages/artifacts-rs/contract
