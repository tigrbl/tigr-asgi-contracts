name: publish-and-release

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: Promoted release-candidate tag to publish from
        required: true

concurrency:
  group: publish-and-release-${{ inputs.rc_tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - name: Download promoted assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/promoted
          gh release download "${{ inputs.rc_tag }}" --dir dist/promoted
      - uses: astral-sh/setup-uv@v7
      - env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv publish dist/promoted/*.whl dist/promoted/*.tar.gz

  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Download promoted assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/promoted
          gh release download "${{ inputs.rc_tag }}" --dir dist/promoted
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish dist/promoted/tigr-contract-artifacts-*.tgz --access public
          npm publish dist/promoted/tigr-asgi-contract-*.tgz --access public

  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -q pyyaml jsonschema
      - env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target_commit=$(gh release view "${{ inputs.rc_tag }}" --json targetCommitish --jq '.targetCommitish')
          git checkout "$target_commit"
      - run: python tools/check_versions.py
      - run: python tools/generate_all.py
      - run: git diff --exit-code
      - run: python packages/artifacts-rs/scripts/vendor_contract.py
      - env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --manifest-path packages/artifacts-rs/Cargo.toml --allow-dirty --no-verify
          cargo publish --manifest-path packages/contract-rs/Cargo.toml --allow-dirty --no-verify
      - run: rm -rf packages/artifacts-rs/contract

  finalize-release:
    needs: [publish-pypi, publish-npm, publish-crates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download promoted assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/promoted
          gh release download "${{ inputs.rc_tag }}" --dir dist/promoted
      - name: Create final GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          target_commit=$(gh release view "${{ inputs.rc_tag }}" --json targetCommitish --jq '.targetCommitish')
          version=$(tr -d '\r\n' < dist/promoted/VERSION)
          final_tag="v${version}"
          if ! git ls-remote --tags origin "$final_tag" | grep -q "$final_tag"; then
            git config user.name github-actions
            git config user.email github-actions@users.noreply.github.com
            git fetch --tags
            git tag "$final_tag" "$target_commit"
            git push origin "$final_tag"
          fi
          gh release create "$final_tag"             dist/promoted/*             --target "$target_commit"             --title "Release $final_tag"             --notes "Published from promoted release candidate ${{ inputs.rc_tag }}."             --latest
