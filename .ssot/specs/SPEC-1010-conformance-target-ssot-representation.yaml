body: |-
  ## Scope
  
  This specification defines the current SSOT representation for conformance targets.
  
  ## Requirements
  
  Conformance targets use `feat:target-*` feature rows.
  
  Profiles may bundle target features.
  
  Future first-class target entities must preserve or migrate existing feature rows.
