body: |-
  ## Scope
  
  This specification governs schema candidates for ASGI header, path, query, peer, and scope metadata surfaces.
  
  ## Requirements
  
  Headers are ordered byte-name and byte-value pairs. Duplicate headers are preserved and header name casing is not normalized by the canonical ASGI header schema.
  
  Decoded `path`, byte `raw_path`, `root_path`, and byte `query_string` remain distinct schema surfaces.
  
  `client`, `server`, `state`, `scheme`, `method`, and scope type are direct ASGI scope metadata schemas.
  
  Derived normalized views may be modeled as separate candidates only when explicitly governed. They must not replace the canonical ASGI field schemas.
  
  ## Validation
  
  Promoted metadata schemas must preserve ASGI field distinctions and must not collapse ordered byte-pair headers into normalized string maps.
